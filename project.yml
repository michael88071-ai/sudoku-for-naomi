name: SudokuForNaomi
options:
  bundleIdPrefix: com.michael88071
  deploymentTarget:
    iOS: "17.0"
  developmentLanguage: en
  createIntermediateGroups: true

settings:
  base:
    SWIFT_VERSION: "5.0"
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    CODE_SIGN_STYLE: Automatic
    ENABLE_PREVIEWS: YES
    # DEVELOPMENT_TEAM is intentionally unset here — it's set per-developer
    # via Xcode's Signing & Capabilities pane (or via a local override in
    # project.local.yml). This keeps the public repo from leaking team IDs.

targets:
  SudokuForNaomi:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: SudokuForNaomi
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.michael88071.SudokuForNaomi
        PRODUCT_NAME: SudokuForNaomi
        TARGETED_DEVICE_FAMILY: "1"
        CURRENT_PROJECT_VERSION: "1"
        MARKETING_VERSION: "1.0"
        GENERATE_INFOPLIST_FILE: YES
        INFOPLIST_KEY_CFBundleDisplayName: "Sudoku for Naomi"
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
        INFOPLIST_KEY_UISupportedInterfaceOrientations_iPhone: "UIInterfaceOrientationPortrait"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        SWIFT_EMIT_LOC_STRINGS: YES

  SudokuForNaomiTests:
    type: bundle.unit-test
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: SudokuForNaomiTests
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.michael88071.SudokuForNaomiTests
        GENERATE_INFOPLIST_FILE: YES
    dependencies:
      - target: SudokuForNaomi

schemes:
  SudokuForNaomi:
    build:
      targets:
        SudokuForNaomi: all
        SudokuForNaomiTests: [test]
    run:
      config: Debug
    test:
      config: Debug
      gatherCoverageData: true
      targets:
        - SudokuForNaomiTests
    profile:
      config: Release
    analyze:
      config: Debug
    archive:
      config: Release
